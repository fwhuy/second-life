<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Second Life AI</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♻️</text></svg>" />
</head>
<body>
  <header class="nav">
    <a class="brand" href="#/" data-link>
      <span class="brand-mark" aria-hidden="true">♺</span>
      <span class="brand-name">Second Life<span class="brand-ai">AI</span></span>
    </a>
    <nav class="nav-links">
      <a href="#/identify" data-link>Identify</a>
      <a href="#/explore" data-link>Explore</a>
      <a href="#/about" data-link>About</a>
    </nav>
  </header>

  <main id="app"><!-- views injected here --></main>

  <footer class="foot">
    <span id="foot-model">Loading model…</span>
    <span class="foot-sep">·</span>
    <span>Runs fully offline · predictions are the model's real output</span>
  </footer>

  <!-- ===================== VIEW TEMPLATES ===================== -->

  <template id="view-home">
    <section class="hero">
      <p class="eyebrow">A field guide to renewal</p>
      <h1 class="hero-title">Every object gets<br><em>a second life.</em></h1>
      <p class="hero-lede">Show me a piece of trash. I'll tell you what it is, where it belongs,
        and what it could become — then play out the two futures waiting for it.</p>
      <div class="hero-actions">
        <a class="btn btn-primary" href="#/identify" data-link>Identify an item</a>
        <a class="btn btn-ghost" href="#/about" data-link>How this works</a>
      </div>
      <ul class="material-strip" aria-label="The six materials I know">
        <li data-cls="cardboard">Cardboard</li>
        <li data-cls="paper">Paper</li>
        <li data-cls="glass">Glass</li>
        <li data-cls="metal">Metal</li>
        <li data-cls="plastic">Plastic</li>
        <li data-cls="trash">General waste</li>
      </ul>
    </section>
  </template>

  <template id="view-identify">
    <section class="stack">
      <p class="eyebrow">Step one</p>
      <h2 class="view-title">What are we giving a second life?</h2>
      <div class="identify-grid">
        <label class="dropzone" id="dropzone">
          <input type="file" id="file-input" accept="image/*" hidden />
          <span class="dropzone-icon" aria-hidden="true">＋</span>
          <span class="dropzone-title">Upload a photo</span>
          <span class="dropzone-sub">or drag it here</span>
        </label>
        <div class="samples">
          <p class="samples-label">No photo handy? Try one:</p>
          <div class="samples-row" id="samples-row"></div>
        </div>
      </div>
      <div id="identify-status" class="status" hidden></div>
    </section>
  </template>

  <template id="view-result">
    <section class="stack result">
      <div class="result-head">
        <img id="r-image" class="result-image" alt="The item you identified" />
        <div class="result-headline">
          <p class="eyebrow">I think this is</p>
          <h2 class="result-name" id="r-name">—</h2>
          <p class="result-tagline" id="r-tagline"></p>
          <div class="confidence" id="r-confidence"></div>
          <div class="result-cta">
            <a class="btn btn-primary" href="#/simulator" data-link>Play its future →</a>
            <a class="btn btn-ghost" href="#/identify" data-link>Identify another</a>
          </div>
        </div>
      </div>

      <div class="blocks">
        <article class="block block-bin" id="r-bin-block">
          <h3 class="block-title">Which bin</h3>
          <p class="bin-name" id="r-bin"></p>
          <p class="block-note" id="r-prep"></p>
        </article>
        <article class="block">
          <h3 class="block-title">What it's made of</h3>
          <p id="r-material"></p>
          <dl class="factlist">
            <div><dt>Recyclable</dt><dd id="r-recyclable"></dd></div>
            <div><dt>In landfill</dt><dd id="r-decompose"></dd></div>
          </dl>
        </article>
        <article class="block">
          <h3 class="block-title">Its second life</h3>
          <ul class="chips" id="r-secondlife"></ul>
        </article>
        <article class="block">
          <h3 class="block-title">You might mean</h3>
          <ul class="chips chips-quiet" id="r-related"></ul>
        </article>
      </div>
      <p class="didyouknow" id="r-didyouknow"></p>
    </section>
  </template>

  <template id="view-simulator">
    <section class="stack sim">
      <p class="eyebrow">The future simulator</p>
      <h2 class="view-title" id="s-title">Two futures for this <span id="s-name">object</span></h2>
      <p class="sim-lede">The same item, two roads. Choose one.</p>

      <div class="fork" id="s-fork">
        <button class="path path-good" data-path="good">
          <span class="path-label">Recycle it right</span>
          <span class="path-hint">Into the right bin</span>
        </button>
        <span class="fork-stem" aria-hidden="true"></span>
        <button class="path path-bad" data-path="bad">
          <span class="path-label">Throw it away</span>
          <span class="path-hint">Straight to landfill</span>
        </button>
      </div>

      <div class="outcome" id="s-outcome" hidden>
        <div class="outcome-card" id="s-outcome-card">
          <p class="outcome-tag" id="s-outcome-tag"></p>
          <p class="outcome-body" id="s-outcome-body"></p>
        </div>
        <div class="rewrite" id="s-rewrite" hidden>
          <button class="btn btn-rewrite" id="s-rewrite-btn">↺ Rewrite its future</button>
        </div>
        <div class="rewritten" id="s-rewritten" hidden>
          <p class="rewritten-tag">A message from the future</p>
          <p class="rewritten-body" id="s-rewritten-body"></p>
          <a class="btn btn-ghost" href="#/explore" data-link>Add it to my record →</a>
        </div>
      </div>
    </section>
  </template>

  <template id="view-explore">
    <section class="stack">
      <p class="eyebrow">Exploration space</p>
      <h2 class="view-title">Today's object</h2>
      <article class="spotlight" id="spotlight">
        <h3 class="spotlight-title" id="sp-title">—</h3>
        <p class="spotlight-body" id="sp-body"></p>
      </article>

      <h2 class="view-title record-title">Your record</h2>
      <div class="record-stats" id="record-stats"></div>
      <ul class="record-list" id="record-list"></ul>
      <p class="record-empty" id="record-empty" hidden>Nothing yet. Identify an item to start your record.</p>
    </section>
  </template>

  <template id="view-about">
    <section class="stack prose">
      <p class="eyebrow">About</p>
      <h2 class="view-title">Honest by design</h2>
      <p>Second Life AI runs on a classifier we trained ourselves on the
        <strong>TrashNet</strong> dataset — 2,527 photos across six materials. It runs
        entirely offline; every confidence you see is the model's real output, never dressed up.</p>
      <h3>The numbers</h3>
      <p>Our current model reaches <strong>94.93% validation accuracy</strong> (ResNet-50 with
        4-view test-time augmentation). We report validation honestly because our test set is
        touched exactly once, at the very end — no peeking to inflate a number.</p>
      <p class="about-note" id="about-live"></p>
      <h3>Why we trust it</h3>
      <p>Published accuracies on TrashNet often reach 99–100%, but many come from data leakage —
        near-duplicate photos of the same object landing in both training and test. Our pipeline
        keeps every object's photos together in one split, so the model is never tested on
        something it trained on. Lower number, real number.</p>
      <h3>One honest caveat</h3>
      <p>The model knows six material classes. Real recycling has more — food waste, hazardous
        items, e-waste — that it was never taught. Bin guidance here follows a common municipal
        scheme and <strong>varies by where you live</strong>; treat it as a strong hint, not law.</p>
    </section>
  </template>

  <script src="app.js"></script>
</body>
</html>
