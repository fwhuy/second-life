# M2.1 bake-off candidate — the small/efficient option (bigger is not reliably
# better on 2500 images).
run_name: effnetv2_s_224
seed: 42
model: tf_efficientnetv2_s.in21k_ft_in1k
img_size: 224
batch_size: 32
num_workers: 4
epochs_head: 3
epochs_ft: 50
lr_head: 1.0e-3
lr_backbone: 1.0e-5
weight_decay: 0.05
label_smoothing: 0.1
warmup_epochs: 3
ema: true
ema_decay: 0.9998
amp: true
early_stop_patience: 10
class_weighting: weighted_sampler
aug: modern
mixup: 0.2
cutmix: 0.2
random_erasing: 0.25
init_checkpoint: null
data_dir: data/raw
splits_dir: data/splits
