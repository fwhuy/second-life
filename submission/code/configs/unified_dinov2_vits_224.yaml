# Unified-corpus bake-off candidate (22.1M params, cap 30M).
# Fold 0 only: python -m src.train --config configs/unified_dinov2_vits_224.yaml --fold 0
# Splits come from data/splits_unified — quarantine.csv is enforced on load.
run_name: unified_dinov2_vits_224
model: vit_small_patch14_reg4_dinov2.lvd142m
model_kwargs:
  img_size: 224
batch_size: 32
lr_head: 1.0e-3
lr_backbone: 5.0e-6
seed: 42
img_size: 224
num_workers: auto
epochs_head: 3
epochs_ft: 30
weight_decay: 0.05
label_smoothing: 0.1
warmup_epochs: 3
ema: true
ema_decay: 0.9998
amp: true
# torch.compile: 1.2-2x on modern GPUs, slow first epoch. Verify on a short run.
compile: false
prefetch_factor: 4
early_stop_patience: 8

# 11k images (4.5x the old corpus) supports heavier regularisation than TrashNet did.
class_weighting: weighted_sampler
aug: modern
mixup: 0.2
cutmix: 0.2
random_erasing: 0.25
aug_boost_classes: []

init_checkpoint: null
data_dir: data/unified_waste/included
splits_dir: data/splits_unified
