run_name: baseline_naive_mlp
model: naive_mlp
seed: 42
classes: [cardboard, glass, metal, paper, plastic, trash]

splits_csv: submission/code/data/splits/folds.csv
data_root: submission/code
val_fold: 0

epochs: 40
batch_size: 64
num_workers: auto
img_size: 128

lr: 1.0e-3
weight_decay: 1.0e-4
label_smoothing: 0.05
hidden_dim: 512
dropout: 0.30
amp: true

wandb_project: second-life-baselines
wandb_group: baselines-40ep-bs64
