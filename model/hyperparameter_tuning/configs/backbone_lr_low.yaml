run_name: tune_backbone_lr_low
seed: 42
model: resnet50.tv2_in1k
img_size: 224
batch_size: 32
num_workers: 4
epochs_head: 5
epochs_ft: 40
lr_head: 1.0e-3
lr_backbone: 3.0e-6
weight_decay: 0.05
label_smoothing: 0.1
warmup_epochs: 3
ema: true
ema_decay: 0.9998
amp: true
early_stop_patience: 10
class_weighting: weighted_sampler
aug: basic
mixup: 0.0
cutmix: 0.0
random_erasing: 0.0
init_checkpoint: null
data_dir: data/raw
splits_dir: data/splits
