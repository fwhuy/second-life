# M2.2 progressive resizing: fine-tune the 224 winner's weights at 384.
# Set init_checkpoint to the 224 run's best checkpoint before launching.
run_name: convnextv2_base_384
seed: 42
model: convnextv2_base.fcmae_ft_in22k_in1k_384
img_size: 384
batch_size: 8
num_workers: 4
epochs_head: 0
epochs_ft: 30
lr_head: 2.0e-4
lr_backbone: 2.0e-6
weight_decay: 0.05
label_smoothing: 0.1
warmup_epochs: 2
ema: true
ema_decay: 0.9998
amp: true
early_stop_patience: 8
class_weighting: weighted_sampler
aug: modern
mixup: 0.2
cutmix: 0.2
random_erasing: 0.25
init_checkpoint: checkpoints/convnextv2_base_224/best.pth
data_dir: data/raw
splits_dir: data/splits
